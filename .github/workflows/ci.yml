name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/python/

      - name: Type check with mypy
        run: |
          mypy src/python/

      - name: Run tests
        run: |
          pytest tests/python/ -v --cov=src/python --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  node-tests:
    # ⚠️ TypeScript/JavaScript 实现为 V1 (4.1.0) 遗留代码，尚未升级到 V2.0 七层架构。
    # 此 job 允许失败，不阻塞 V2.0（Python）发布。TS 升级跟踪于 Roadmap。
    continue-on-error: true
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python linting tools
        run: |
          pip install ruff black isort mypy

      - name: Check Python formatting
        run: |
          black --check src/python/
          isort --check-only src/python/

      - name: Lint Python
        run: |
          ruff check src/python/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Node.js linting tools
        run: npm ci

      - name: Lint TypeScript
        # ⚠️ TS 为 V1 遗留代码，允许失败，不阻塞 V2.0 发布。
        continue-on-error: true
        run: npm run lint
