name: CI Check Bot

on:
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify OpenClaw
        run: |
          curl -X POST http://localhost:18789/webhook/ci \
            -H "Content-Type: application/json" \
            -d '{"event": "ci_completed", "status": "${{ github.event.check_suite.conclusion }}"}'
